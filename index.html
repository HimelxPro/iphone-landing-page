<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iPhone 15 Pro Max - Exclusive Offer</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Hind Siliguri', sans-serif; overflow-x: hidden; }
        .slider-image { width: 100%; height: auto; max-height: 400px; object-fit: contain; }
    </style>
</head>
<body class="bg-gray-100">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const LandingPage = () => {
            const [timeLeft, setTimeLeft] = useState(1715); // ২৯ মিনিট সামথিং
            const [currentImg, setCurrentImg] = useState(0);
            const [showPopup, setShowPopup] = useState(false);

            const images = [
                "https://i.ibb.co.com/gbyH4tY2/50a71c0303bca79fc4d2fae2ca50cfd1.png",
                "https://i.ibb.co.com/jvvx7964/7027ce0fdbb92010a312f4814bb04afc.png",
                "https://i.ibb.co.com/bgBP1D78/3f82de66235c46865d5276b1b69ba22f.png",
                "https://i.ibb.co.com/ccCJWnFt/pngwing-com.png"
            ];

            const reviews = [
                { name: "Sabbir Ahmed", rating: 5, comment: "Alhamdulillah, 1000 takay phone ti pelam!", date: "2 mins ago" },
                { name: "Rakibul Hasan", rating: 5, comment: "First a bissas hoy ni, kintu delivery peye obak.", date: "5 mins ago" },
                { name: "Anika Tabassum", rating: 4, comment: "Titanium color ta khub sundor.", date: "10 mins ago" }
            ];

            useEffect(() => {
                const timer = setInterval(() => {
                    setTimeLeft(prev => (prev > 0 ? prev - 1 : 0));
                }, 1000);
                return () => clearInterval(timer);
            }, []);

            useEffect(() => {
                const slide = setInterval(() => {
                    setCurrentImg(prev => (prev === images.length - 1 ? 0 : prev + 1));
                }, 3000);
                return () => clearInterval(slide);
            }, []);

            const formatTime = (s) => `${Math.floor(s / 60)}:${(s % 60).toString().padStart(2, '0')}`;

            return (
                <div className="max-w-md mx-auto bg-white min-h-screen shadow-2xl pb-24">
                    {/* Flash Sale Bar */}
                    <div className="bg-red-600 text-white text-center py-2 font-bold text-sm sticky top-0 z-50">
                        ফ্ল্যাশ সেল শেষ হতে বাকি: {formatTime(timeLeft)} মিনিট
                    </div>

                    {/* Image Slider */}
                    <div className="relative h-[400px] bg-white flex items-center justify-center p-4">
                        <img src={images[currentImg]} className="slider-image transition-opacity duration-500" alt="iPhone" />
                        <div className="absolute bottom-4 flex gap-2">
                            {images.map((_, i) => (
                                <div key={i} className={`h-1.5 w-1.5 rounded-full ${currentImg === i ? 'bg-blue-600 w-4' : 'bg-gray-300'}`}></div>
                            ))}
                        </div>
                    </div>

                    {/* Product Info */}
                    <div className="p-6">
                        <div className="flex justify-between items-start">
                            <div>
                                <h1 className="text-2xl font-black italic">iPhone 15 Pro Max</h1>
                                <p className="text-gray-500 text-xs">256GB, Titanium Edition</p>
                            </div>
                            <span className="bg-red-100 text-red-600 text-[10px] px-2 py-1 rounded-full font-bold uppercase">অফিসিয়াল ওয়ারেন্টি</span>
                        </div>
                        <div className="mt-4 flex items-center gap-3">
                            <span className="text-4xl font-black text-blue-600">৳ ১,০০০</span>
                            <span className="text-lg text-gray-400 line-through">৳ ১,৫৯,০০০</span>
                        </div>
                    </div>

                    {/* Review Section */}
                    <div className="p-6 bg-gray-50">
                        <h3 className="text-lg font-bold mb-4">কাস্টমার রিভিউ ({reviews.length})</h3>
                        <div className="space-y-4">
                            {reviews.map((r, i) => (
                                <div key={i} className="bg-white p-4 rounded-xl shadow-sm border border-gray-100">
                                    <div className="flex justify-between items-center mb-1">
                                        <p className="font-bold text-sm">{r.name}</p>
                                        <span className="text-gray-400 text-[10px]">{r.date}</span>
                                    </div>
                                    <div className="flex text-yellow-400 mb-2">{"★".repeat(r.rating)}</div>
                                    <p className="text-gray-600 text-sm leading-relaxed italic">"{r.comment}"</p>
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* Order Form */}
                    <div id="order" className="p-6 bg-white border-t-2 border-dashed border-gray-200">
                        <h3 className="text-xl font-black text-center mb-6 border-b pb-2">অর্ডার ফর্ম</h3>
                        <form className="space-y-4" onSubmit={(e) => { e.preventDefault(); setShowPopup(true); }}>
                            <input type="text" placeholder="আপনার নাম" className="w-full p-4 rounded-xl border border-gray-200 bg-gray-50 focus:ring-2 focus:ring-blue-500 outline-none" required />
                            <input type="tel" placeholder="মোবাইল নাম্বার" className="w-full p-4 rounded-xl border border-gray-200 bg-gray-50 focus:ring-2 focus:ring-blue-500 outline-none" required />
                            <textarea placeholder="বিস্তারিত ঠিকানা" className="w-full p-4 rounded-xl border border-gray-200 bg-gray-50 focus:ring-2 focus:ring-blue-500 outline-none" rows="2" required></textarea>
                            <div className="bg-blue-600 text-white p-5 rounded-2xl shadow-lg">
                                <p className="text-xs font-bold mb-1 opacity-80">বিকাশ ১,০০০৳ (সেন্ড মানি) করুন:</p>
                                <p className="text-2xl font-black tracking-widest">01870428306</p>
                                <input type="text" placeholder="TrxID দিন" className="w-full p-3 mt-4 bg-white text-gray-900 rounded-lg font-bold" required />
                            </div>
                            <button type="submit" className="w-full bg-blue-700 text-white py-5 rounded-2xl font-black text-xl shadow-xl active:scale-95 transition-all">অর্ডার কনফার্ম করুন</button>
                        </form>
                    </div>

                    {/* Fixed Buy Button */}
                    <div className="fixed bottom-0 left-0 right-0 p-4 bg-white/80 backdrop-blur-md border-t z-50 flex justify-center">
                        <button onClick={() => document.getElementById('order').scrollIntoView({behavior: 'smooth'})} className="max-w-md w-full bg-green-500 text-white py-4 rounded-2xl text-xl font-black shadow-lg animate-pulse">BUY NOW</button>
                    </div>

                    {/* Popup */}
                    {showPopup && (
                        <div className="fixed inset-0 bg-black/90 flex items-center justify-center z-[100] p-6 text-center">
                            <div className="bg-white p-10 rounded-[40px] max-w-xs shadow-2xl border-t-8 border-green-500">
                                <div className="text-6xl mb-4">✅</div>
                                <h2 className="text-2xl font-black text-green-600">অর্ডার সফল!</h2>
                                <p className="text-gray-500 mt-2">আপনার পেমেন্ট ভেরিফাই করা হচ্ছে। খুব দ্রুত আপনার সাথে যোগাযোগ করা হবে।</p>
                                <button onClick={() => setShowPopup(false)} className="mt-8 w-full bg-gray-900 text-white py-4 rounded-2xl font-bold uppercase">Close</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<LandingPage />);
    </script>
</body>
</html>
